name: Fetch Threads Clean Data Artifact

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/pending_threads_urls.txt'
      - 'scripts/fetch_threads_clean_data.py'

permissions:
  contents: read
  actions: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Prepare output path
        id: prep
        run: |
          mkdir -p data/source_fetch_results
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          echo "output_file=data/source_fetch_results/threads_${TS}.json" >> "$GITHUB_OUTPUT"

      - name: Fetch pending Threads URLs
        run: |
          if [ -f "data/pending_threads_urls.txt" ] && [ -s "data/pending_threads_urls.txt" ]; then
            python scripts/fetch_threads_clean_data.py data/pending_threads_urls.txt --batch --debug > "${{ steps.prep.outputs.output_file }}"
          else
            echo '{"status":"no_input","message":"data/pending_threads_urls.txt is missing or empty."}' > "${{ steps.prep.outputs.output_file }}"
          fi
          cat "${{ steps.prep.outputs.output_file }}"

      - name: Upload fetch result artifact
        uses: actions/upload-artifact@v4
        with:
          name: threads-fetch-result
          path: data/source_fetch_results/*.json
          if-no-files-found: error
          retention-days: 7
