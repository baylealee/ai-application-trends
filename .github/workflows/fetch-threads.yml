name: Fetch Threads Clean Data

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/pending_threads_urls.txt'
      - 'scripts/fetch_threads_clean_data.py'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Prepare output path
        id: prep
        run: |
          mkdir -p data/source_fetch_results
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          echo "output_file=data/source_fetch_results/threads_${TS}.json" >> "$GITHUB_OUTPUT"

      - name: Fetch pending Threads URLs
        run: |
          if [ -f "data/pending_threads_urls.txt" ] && [ -s "data/pending_threads_urls.txt" ]; then
            python scripts/fetch_threads_clean_data.py data/pending_threads_urls.txt --batch --debug > "${{ steps.prep.outputs.output_file }}"
          else
            echo '{"status":"no_input","message":"data/pending_threads_urls.txt is missing or empty."}' > "${{ steps.prep.outputs.output_file }}"
          fi
          cat "${{ steps.prep.outputs.output_file }}"

      - name: Commit fetch result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.prep.outputs.output_file }}"
          git commit -m "Add Threads fetch result" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin HEAD:main
