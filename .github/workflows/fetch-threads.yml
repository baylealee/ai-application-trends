name: Fetch Threads Clean Data

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Single Threads URL to fetch'
        required: true
        type: string
      debug:
        description: 'Return full candidate text for debugging'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Prepare output path
        id: prep
        run: |
          mkdir -p data/source_fetch_results
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          echo "output_file=data/source_fetch_results/threads_${TS}.json" >> "$GITHUB_OUTPUT"

      - name: Fetch Threads data
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            python scripts/fetch_threads_clean_data.py "${{ inputs.url }}" --debug > "${{ steps.prep.outputs.output_file }}"
          else
            python scripts/fetch_threads_clean_data.py "${{ inputs.url }}" > "${{ steps.prep.outputs.output_file }}"
          fi
          cat "${{ steps.prep.outputs.output_file }}"

      - name: Commit fetch result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.prep.outputs.output_file }}"
          git commit -m "Add Threads fetch result" || echo "No changes to commit"
          git push
